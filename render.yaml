services:
  - type: web
    name: app-castelar
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run main.py --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
